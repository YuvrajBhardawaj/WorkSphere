<div class="h-screen flex items-center justify-center bg-gray-100">

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="bg-white p-6 rounded-xl shadow w-80 space-y-4">

    <h2 class="text-lg font-semibold text-center">Login</h2>

    <input type="email" placeholder="Email" formControlName="email" class="w-full border p-2 rounded-md" />

    <input type="password" placeholder="Password" formControlName="password" class="w-full border p-2 rounded-md" />

    <button type="submit" class="w-full bg-black text-white py-2 rounded-md">
      Login
    </button>

  </form>

</div>
