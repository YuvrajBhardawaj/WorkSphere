<div class="min-h-screen bg-gradient-to-br from-blue-50 via-cyan-50 to-teal-50 p-6">
  <div class="max-w-6xl mx-auto">
    
    <!-- Header -->
    <div class="mb-6">
      <div class="flex items-center gap-4 mb-4">
        <mat-icon class="text-4xl text-blue-600">people</mat-icon>
        <div>
          <h1 class="text-3xl font-bold text-gray-800">Employees</h1>
          <p class="text-gray-600 text-sm mt-1">{{ data.length }} team members</p>
        </div>
      </div>
    </div>

    <!-- Table Card -->
    <mat-card class="shadow-2xl">
      <div class="overflow-x-auto">
        <table mat-table [dataSource]="data" class="w-full">
          
          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef class="font-bold text-gray-800 bg-gray-50">Name</th>
            <td mat-cell *matCellDef="let row" class="py-3">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
                  <span class="text-sm font-bold text-blue-600">{{ row.name.charAt(0).toUpperCase() }}</span>
                </div>
                <span class="font-medium text-gray-900">{{ row.name }}</span>
              </div>
            </td>
          </ng-container>

          <!-- Designation Column -->
          <ng-container matColumnDef="designation">
            <th mat-header-cell *matHeaderCellDef class="font-bold text-gray-800 bg-gray-50">Role</th>
            <td mat-cell *matCellDef="let row" class="py-3">
              <mat-chip class="bg-blue-50 text-blue-700">{{ row.designation }}</mat-chip>
            </td>
          </ng-container>

          <!-- Experience Column -->
          <ng-container matColumnDef="experience">
            <th mat-header-cell *matHeaderCellDef class="font-bold text-gray-800 bg-gray-50">Experience</th>
            <td mat-cell *matCellDef="let row" class="py-3">
              <span class="px-3 py-1 text-xs font-bold bg-green-100 text-green-800 rounded-full">
                {{ row.experience }} yrs
              </span>
            </td>
          </ng-container>

          <!-- Status Column -->
          <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef class="font-bold text-gray-800 bg-gray-50">Status</th>
            <td mat-cell *matCellDef="let row" class="py-3">
              @if (row.role === 'manager') {
                <mat-chip class="bg-purple-100 text-purple-800 font-bold">Manager</mat-chip>
              } @else {
                <mat-chip class="bg-gray-100 text-gray-800">Employee</mat-chip>
              }
            </td>
          </ng-container>

          <!-- Created Column -->
          <ng-container matColumnDef="created">
            <th mat-header-cell *matHeaderCellDef class="font-bold text-gray-800 bg-gray-50">Created</th>
            <td mat-cell *matCellDef="let row" class="py-3 text-gray-700">
              {{ row.created_at | date: "MMM dd, yyyy" }}
            </td>
          </ng-container>

          <!-- Header Row -->
          <tr mat-header-row *matHeaderRowDef="displayedColumns" class="border-b-2 border-gray-200"></tr>

          <!-- Data Rows -->
          <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="border-b border-gray-100 hover:bg-blue-50 transition-colors cursor-pointer"></tr>
        </table>
      </div>
      
      <!-- Paginator -->
      <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
    </mat-card>

  </div>
</div>
