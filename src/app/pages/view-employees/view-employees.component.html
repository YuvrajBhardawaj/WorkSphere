<div
  class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"
>
  <!-- Table -->
  <div class="overflow-x-auto">
    <table mat-table [dataSource]="data" class="w-full text-sm">
      <!-- Name -->
      <ng-container matColumnDef="name">
        <th
          mat-header-cell
          *matHeaderCellDef
          class="px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wide"
        >
          Name
        </th>
        <td
          mat-cell
          *matCellDef="let row"
          class="px-5 py-4 font-medium text-gray-500"
        >
          {{ row.name }}
        </td>
      </ng-container>

      <!-- Designation -->
      <ng-container matColumnDef="designation">
        <th
          mat-header-cell
          *matHeaderCellDef
          class="px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wide"
        >
          Designation
        </th>
        <td mat-cell *matCellDef="let row" class="px-5 py-4 text-gray-600">
          {{ row.designation }}
        </td>
      </ng-container>

      <!-- Experience -->
      <ng-container matColumnDef="experience">
        <th
          mat-header-cell
          *matHeaderCellDef
          class="px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wide"
        >
          Experience
        </th>
        <td mat-cell *matCellDef="let row" class="px-5 py-4">
          <span
            class="px-2 py-1 text-xs font-medium bg-gray-100 text-gray-700 rounded-md"
          >
            {{ row.experience }} yrs
          </span>
        </td>
      </ng-container>
      <!-- Created -->
      <ng-container matColumnDef="created">
        <th
          mat-header-cell
          *matHeaderCellDef
          class="px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wide"
        >
          Created
        </th>
        <td mat-cell *matCellDef="let row" class="px-5 py-4 text-gray-700">
          {{ row.created_at | date: "mediumDate" }}
        </td>
      </ng-container>
<!-- Role column -->
<ng-container matColumnDef="role">
  <th mat-header-cell *matHeaderCellDef
    class="px-5 py-3 text-xs font-medium text-gray-500 uppercase tracking-wide">
    Role
  </th>
  <td mat-cell *matCellDef="let row" class="px-5 py-4 text-gray-700">
    <span class="px-2 py-1 text-xs font-medium bg-blue-100 text-blue-700 rounded-md">
      {{ row.role || 'N/A' }}
    </span>
  </td>
</ng-container>

      <!-- Header Row -->
      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns"
        class="bg-gray-50"
      ></tr>

      <!-- Data Row -->
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        class="border-t border-gray-100 hover:bg-gray-50 transition-colors duration-150"
      ></tr>
    </table>
  </div>
</div>
