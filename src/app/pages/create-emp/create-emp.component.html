<div class="min-h-screen bg-gradient-to-br from-green-50 via-emerald-50 to-teal-50 p-6">
  <div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      
      <!-- Header -->
      <div class="bg-gradient-to-r from-green-600 to-emerald-600 text-white p-8">
        <div class="flex items-center gap-4">
          <mat-icon class="text-4xl">person_add</mat-icon>
          <div>
            <h2 class="text-3xl font-bold">New Employee</h2>
            <p class="text-green-100 text-sm mt-1">Add a new team member</p>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div class="p-8">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
          
          <!-- Row 1: Name & Email -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="relative">
              <mat-icon class="absolute left-3 top-3.5 text-gray-400 pointer-events-none text-xl">person</mat-icon>
              <input 
                type="text"
                formControlName="name" 
                placeholder="John Doe"
                class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition"
              />
            </div>

            <div class="relative">
              <mat-icon class="absolute left-3 top-3.5 text-gray-400 pointer-events-none text-xl">email</mat-icon>
              <input 
                type="email"
                formControlName="email" 
                placeholder="john@company.com"
                class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition"
              />
            </div>
          </div>

          <!-- Row 2: Password & Designation -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="relative">
              <mat-icon class="absolute left-3 top-3.5 text-gray-400 pointer-events-none text-xl">lock</mat-icon>
              <input 
                type="password"
                formControlName="password" 
                placeholder="••••••••"
                class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition"
              />
            </div>

            <div class="relative">
              <mat-icon class="absolute left-3 top-3.5 text-gray-400 pointer-events-none text-xl">work</mat-icon>
              <input 
                type="text"
                formControlName="designation" 
                placeholder="Developer"
                class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition"
              />
            </div>
          </div>

          <!-- Row 3: Experience & Role -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="relative">
              <mat-icon class="absolute left-3 top-3.5 text-gray-400 pointer-events-none text-xl">trending_up</mat-icon>
              <input 
                type="number"
                formControlName="experience" 
                placeholder="0"
                min="0"
                class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition"
              />
            </div>

            <div class="relative">
              <mat-icon class="absolute left-3 top-3.5 text-gray-400 pointer-events-none text-xl">assignment</mat-icon>
              <select 
                formControlName="roleid"
                class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition appearance-none bg-white cursor-pointer"
              >
                <option value="">-- Select Role --</option>
                @for (role of roles; track role.id) {
                  <option [value]="role.id">{{ role.name | titlecase }}</option>
                }
              </select>
            </div>
          </div>

          <!-- Buttons -->
          <div class="flex gap-4 pt-4">
            <button mat-raised-button color="primary" [disabled]="form.invalid" type="submit" class="flex-1 h-10">
              Create Employee
            </button>
            <button mat-stroked-button type="button" (click)="form.reset()" class="flex-1 h-10">
              Clear
            </button>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>
