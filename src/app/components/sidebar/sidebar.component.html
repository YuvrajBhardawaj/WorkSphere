<aside
  [class]="isExpanded() ? 'w-64' : 'w-20'"
  class="fixed left-0 top-0 h-screen bg-[#171717] text-gray-400 flex flex-col transition-all duration-300 ease-in-out overflow-hidden"
>
  <!-- Logo -->
  <div class="flex items-center h-14 px-4 border-b border-gray-800">
    <!-- Title -->
    <div class="overflow-hidden ml-3" [hidden]="!isExpanded()">
      <span
        class="text-sm font-semibold text-white tracking-tight whitespace-nowrap block transition-all duration-300"
        [class.opacity-0]="!isExpanded()"
        [class.translate-x-[-8px]]="!isExpanded()"
      >
        Employee Panel
      </span>
    </div>

    <!-- Toggle -->
    <button
      (click)="toggleSidebar()"
      class="ml-auto p-1.5 rounded-md hover:bg-white/10 transition hidden sm:flex"
    >
      <span
        class="material-symbols-outlined items-center text-base text-gray-300"
      >
        side_navigation
      </span>
    </button>
  </div>

  <!-- Menu -->
  <nav class="flex-1 px-2 py-4 space-y-1">
    <a
      routerLink="/dashboard"
      routerLinkActive="bg-white/10 text-white"
      [routerLinkActiveOptions]="{ exact: true }"
      class="group flex items-center px-3 py-2 rounded-md text-sm font-medium transition-all duration-200 hover:bg-white/10"
      [class.justify-center]="!isExpanded()"
      [class.gap-3]="isExpanded()"
    >
      <span class="text-lg">🏠</span>
      <div class="overflow-hidden">
        <span
          class="whitespace-nowrap block transition-all duration-300"
          [class.opacity-0]="!isExpanded()"
          [class.translate-x-[-8px]]="!isExpanded()"
          >Dashboard</span
        >
      </div>
    </a>
    @if (currentUser?.role === "admin") {
      <a
        routerLink="/employees"
        routerLinkActive="bg-white/10 text-white"
        class="group flex items-center px-3 py-2 rounded-md text-sm font-medium transition-all duration-200 hover:bg-white/10"
        [class.justify-center]="!isExpanded()"
        [class.gap-3]="isExpanded()"
      >
        <span class="text-lg">👨‍💼</span>
        <div class="overflow-hidden">
          <span
            class="whitespace-nowrap block transition-all duration-300"
            [class.opacity-0]="!isExpanded()"
            [class.translate-x-[-8px]]="!isExpanded()"
            >Employees</span
          >
        </div>
      </a>

      <a
        routerLink="/addEmployee"
        routerLinkActive="bg-white/10 text-white"
        class="group flex items-center px-3 py-2 rounded-md text-sm font-medium transition-all duration-200 hover:bg-white/10"
        [class.justify-center]="!isExpanded()"
        [class.gap-3]="isExpanded()"
      >
        <span class="text-lg">➕</span>
        <div class="overflow-hidden">
          <span
            class="whitespace-nowrap block transition-all duration-300"
            [class.opacity-0]="!isExpanded()"
            [class.translate-x-[-8px]]="!isExpanded()"
            >Add Employee</span
          >
        </div>
      </a>

      <a
        routerLink="/projects"
        routerLinkActive="bg-white/10 text-white"
        class="group flex items-center px-3 py-2 rounded-md text-sm font-medium transition-all duration-200 hover:bg-white/10"
        [class.justify-center]="!isExpanded()"
        [class.gap-3]="isExpanded()"
      >
        <span class="text-lg">📁</span>
        <div class="overflow-hidden">
          <span
            class="whitespace-nowrap block transition-all duration-300"
            [class.opacity-0]="!isExpanded()"
            [class.translate-x-[-8px]]="!isExpanded()"
            >Projects</span
          >
        </div>
      </a>

      <a
        routerLink="/addProject"
        routerLinkActive="bg-white/10 text-white"
        class="group flex items-center px-3 py-2 rounded-md text-sm font-medium transition-all duration-200 hover:bg-white/10"
        [class.justify-center]="!isExpanded()"
        [class.gap-3]="isExpanded()"
      >
        <span class="text-lg">➕</span>
        <div class="overflow-hidden">
          <span
            class="whitespace-nowrap block transition-all duration-300"
            [class.opacity-0]="!isExpanded()"
            [class.translate-x-[-8px]]="!isExpanded()"
            >Add Project</span
          >
        </div>
      </a>
    }

    <hr class="border-gray-800 my-1 mx-1" />

    <a
      routerLink="/settings"
      routerLinkActive="bg-white/10 text-white"
      class="group flex items-center px-3 py-2 rounded-md text-sm font-medium transition-all duration-200 hover:bg-white/10"
      [class.justify-center]="!isExpanded()"
      [class.gap-3]="isExpanded()"
    >
      <span class="text-lg">⚙️</span>
      <div class="overflow-hidden">
        <span
          class="whitespace-nowrap block transition-all duration-300"
          [class.opacity-0]="!isExpanded()"
          [class.translate-x-[-8px]]="!isExpanded()"
          >Settings</span
        >
      </div>
    </a>
  </nav>

  <!-- Bottom User -->
  <div class="px-2 pb-3 border-t border-gray-800">
    <button
      class="w-full flex items-center px-3 py-2 mt-2 rounded-md hover:bg-white/10 transition group"
      [class.justify-center]="!isExpanded()"
      [class.gap-3]="isExpanded()"
    >
      <!-- Avatar -->
      <div
        class="w-8 h-8 rounded-full bg-gradient-to-br from-gray-500 to-gray-700 flex items-center justify-center text-xs font-semibold text-white shrink-0"
      >
        YU
      </div>

      <!-- Info -->
      <div class="overflow-hidden">
        <div
          class="flex flex-col text-left leading-tight whitespace-nowrap transition-all duration-300"
          [class.opacity-0]="!isExpanded()"
          [class.translate-x-[-8px]]="!isExpanded()"
        >
          <span class="text-sm text-white font-medium">Yuvraj</span>
          <span class="text-xs text-gray-500">Admin</span>
        </div>
      </div>
    </button>
  </div>
</aside>
