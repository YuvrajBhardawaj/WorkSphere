<div class="min-h-screen bg-gradient-to-br from-purple-50 via-pink-50 to-rose-50 p-6">
  <div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      
      <!-- Header -->
      <div class="bg-gradient-to-r from-purple-600 to-pink-600 text-white p-8">
        <div class="flex items-center gap-4">
          <mat-icon class="text-4xl">folder_new</mat-icon>
          <div>
            <h2 class="text-3xl font-bold">New Project</h2>
            <p class="text-purple-100 text-sm mt-1 font-light">Create and manage projects</p>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div class="p-8">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
          
          <!-- Project Title -->
          <div class="relative">
            <mat-icon class="absolute left-3 top-3.5 text-gray-400 pointer-events-none text-xl">title</mat-icon>
            <input 
              type="text"
              formControlName="title" 
              placeholder="e.g., Mobile App"
              class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition"
            />
          </div>

          <!-- Description -->
          <div class="relative">
            <mat-icon class="absolute left-3 top-3.5 text-gray-400 pointer-events-none text-xl">description</mat-icon>
            <textarea 
              formControlName="description" 
              placeholder="What is this project about?"
              rows="4"
              class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition resize-none"
            ></textarea>
          </div>

          <!-- Manager & Days -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="relative">
              <mat-icon class="absolute left-3 top-3.5 text-gray-400 pointer-events-none text-xl">person</mat-icon>
              <select 
                formControlName="assigned_to"
                class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition appearance-none bg-white cursor-pointer"
              >
                <option value="">-- Select Manager --</option>
                @for (manager of managers; track manager.id) {
                  <option [value]="manager.id">{{ manager.name }}</option>
                }
              </select>
            </div>

            <div class="relative">
              <mat-icon class="absolute left-3 top-3.5 text-gray-400 pointer-events-none text-xl">schedule</mat-icon>
              <input 
                type="number"
                formControlName="days_allocated" 
                placeholder="0"
                min="0"
                class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition"
              />
            </div>
          </div>

          <!-- Status -->
          <div class="relative">
            <mat-icon class="absolute left-3 top-3.5 text-gray-400 pointer-events-none text-xl">info</mat-icon>
            <select 
              formControlName="status"
              class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition appearance-none bg-white cursor-pointer"
            >
              <option value="pending">Active</option>
              <option value="completed">Completed</option>
              <option value="hold">On Hold</option>
            </select>
          </div>

          <!-- Buttons -->
          <div class="flex gap-4 pt-4">
            <button mat-raised-button color="primary" [disabled]="form.invalid" type="submit" class="flex-1 h-10">
              Create Project
            </button>
            <button mat-stroked-button type="button" (click)="form.reset()" class="flex-1 h-10">
              Clear
            </button>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>
